name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: elma0101
          template: classic
          base: header                       # Keep it minimal like the reference
          config_timezone: UTC
          
          # 🎨 Radical Color Palette
          config_colors: |
            {
              "background": "#1a1b27",
              "text": "#a9b1d6",
              "title": "#ff007c",
              "icon": "#79c0ff"
            }
          
          # 🛠️ "Nuclear" CSS Override (This forces the style)
          extras_css: |
            :root {
              --color-calendar-graph-day-bg: #161b22;
              --color-calendar-graph-day-L1-bg: #0e4429;
            }
            svg {
              background: #1a1b27 !important;
              border-radius: 14px !important;
            }
            .container { background: transparent !important; }
            * { 
              font-family: 'JetBrains Mono', monospace !important; 
              color: #a9b1d6 !important; 
            }
            h1, h2, .title { color: #ff007c !important; }
            .field svg { fill: #79c0ff !important; }

          # 🈷️ Languages Plugin
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex
          plugin_languages_details: percentage
          plugin_languages_sections: most-used
          plugin_languages_limit: 5
