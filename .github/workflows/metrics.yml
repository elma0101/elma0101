name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: elma0101
          template: classic
          base: header, repositories
          config_timezone: UTC
          
          # 🎨 Radical Theme Colors
          config_colors: |
            {
              "background": "#1a1b27",
              "text": "#a9b1d6",
              "title": "#ff007c",
              "icon": "#79c0ff"
            }
          
          # 🛠️ Advanced Styling (Rounding & Fonts)
          extras_css: |
            /* The main container background and roundness */
            .container { 
              background-color: #1a1b27 !important; 
              border-radius: 14px !important;
              padding: 20px !important;
            }
            /* Clean coding font */
            * { font-family: 'JetBrains Mono', monospace !important; }
            /* Smooth language bars */
            .languages-chart-item { border-radius: 10px !important; }

          # 🈷️ Languages Plugin (Configured for Backend)
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex
          plugin_languages_details: percentage
          plugin_languages_sections: most-used
          plugin_languages_limit: 8
