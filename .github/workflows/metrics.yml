name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: elma0101
          template: classic
          base: header, repositories                         # Keeps it clean
          config_timezone: UTC
          
          # Most Used Languages Plugin
          plugin_languages: yes
          plugin_languages_ignored: html, css               # Focus on your backend logic (Java, Python, etc.)
          plugin_languages_details: percentage              # Matches your reference
          plugin_languages_sections: most-used
          plugin_languages_limit: 8
          
          # Aesthetic customizations
          config_order: base.header, languages, base.repositories
          # This color scheme mimics the "Radical" theme from your reference
          config_colors: |
             {
               "background": "#1a1b27",
               "text": "#a9b1d6",
               "title": "#ff007c", 
               "icon": "#7aa2f7"
             }
