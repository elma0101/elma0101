name: Metrics
on:
  # Schedule updates (every 12 hours)
  schedule: [{cron: "0 */12 * * *"}]
  # Allows you to run this manually from the Actions tab
  workflow_dispatch:
  # Run on every push to the main branch
  push: {branches: ["master", "main"]}

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: elma0101
          template: classic
          base: header, repositories
          config_timezone: UTC
          
          # 🎨 Visual Customization
          config_colors: |
            {
              "background": "#0d1117", 
              "text": "#c9d1d9",
              "title": "#58a6ff",
              "icon": "#79c0ff"
            }
          
          # 🛠️ Advanced Styling (Rounded Corners & Fonts)
          extras_css: |
            /* Round the main box corners */
            svg { 
              border-radius: 14px; 
            }
            /* Set a modern "Coding" font */
            * { 
              font-family: 'JetBrains Mono', 'Inter', -apple-system, sans-serif !important; 
            }
            /* Style the language progress bars to be smoother */
            .languages-chart-item { border-radius: 4px; }

          # 🈷️ Languages Plugin
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex
          plugin_languages_details: percentage
          plugin_languages_sections: most-used
          plugin_languages_limit: 8
